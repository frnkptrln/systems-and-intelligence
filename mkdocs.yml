site_name: Systems & Intelligence
site_description: Formalizing the boundary between emergent dynamical systems and artificial intelligence.
site_author: "Frank Peterlein"
repo_url: https://github.com/frnkptrln/systems-and-intelligence
repo_name: systems-and-intelligence
edit_uri: blob/main/

docs_dir: 'docs'
nav:
  - Welcome: index.md
  - "📖 The Book - The Grand Synthesis":
      - Introduction: book/00_introduction.md
      - Part 1 - Mechanics of Emergence: book/01_mechanics_of_emergence.md
      - Part 2 - Measuring the Mind: book/02_measuring_the_mind.md
      - Part 3 - Alignment & Control: book/03_alignment_and_control.md
      - Part 4 - Macro-Structures: book/04_macro_structures.md
      - Part 5 - Future Perspectives: book/05_future_perspectives.md
  - "🔬 Core Theories":
      - The Emergence Manifesto: theory/emergence-manifesto-v1.1.md
      - Conceptual Map: theory/conceptual-map.md
      - Simulation Map: theory/simulation-theory-map.md
  - 💻 Simulation Modules:
      - Utility Engineering: simulation-models/utility-engineering/README.md
      - Political Formalization: simulation-models/political-utility-formalization/README.md
      - Systems Orchestration: systems-orchestration/README.md
      - Agentic Identity Suite: agentic-test-suite/README.md
  - 📚 Reference:
      - Glossary: theory/glossary.md
      - Open Problems: theory/open-problems.md

theme:
  name: material
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - scheme: default
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - mdx_math # To support LaTeX math block parsing via MathJax

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js


