name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install numpy networkx pytest
      - name: Unit tests + benchmark headline regression
        run: pytest tests/ -q
      - name: Internal link validation
        run: python lab/tools/validate_links.py
