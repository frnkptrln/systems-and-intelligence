name: Deploy Book to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pip install "mkdocs>=1.5,<2.0" "mkdocs-material>=9.5" "pymdown-extensions>=10.7"
      - run: npm install --no-save --no-package-lock katex@0.18.1
      - name: Mathematical Markdown validation
        run: python lab/tools/validate_math.py
      - run: mkdocs build --strict
      - name: KaTeX rendering validation
        run: node lab/tools/validate_katex.js site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
